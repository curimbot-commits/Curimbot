<div class="theme-toggle" role="group" aria-label="Seleccionar tema visual">
  <button 
    type="button" 
    class="theme-toggle__btn" 
    [class.theme-toggle__btn--active]="currentTheme() === 'light'"
    (click)="setTheme('light')"
    aria-label="Activar tema claro"
    title="Tema claro">
    <i class="fas fa-sun" aria-hidden="true"></i>
  </button>
  
  <button 
    type="button" 
    class="theme-toggle__btn" 
    [class.theme-toggle__btn--active]="currentTheme() === 'system'"
    (click)="setTheme('system')"
    aria-label="Usar tema del sistema"
    title="Tema del sistema">
    <i class="fas fa-desktop" aria-hidden="true"></i>
  </button>

  <button 
    type="button" 
    class="theme-toggle__btn" 
    [class.theme-toggle__btn--active]="currentTheme() === 'dark'"
    (click)="setTheme('dark')"
    aria-label="Activar tema oscuro"
    title="Tema oscuro">
    <i class="fas fa-moon" aria-hidden="true"></i>
  </button>
</div>
